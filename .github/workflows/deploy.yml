name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
      - 'blog-calendar.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      # Pre-deploy guard: verify build matches MTC, not another site
      - name: Verify build output is MTC
        run: |
          TITLE=$(grep -o '<title>[^<]*</title>' dist/index.html | head -1 | sed 's/<[^>]*>//g')
          echo "Build title: $TITLE"
          if ! echo "$TITLE" | grep -qi "MTC Renovations"; then
            echo "::error::Build title '$TITLE' does not match MTC Renovations. BLOCKING deploy to prevent cross-contamination."
            exit 1
          fi

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=mtc-renovations --branch=main --commit-dirty=true

      - name: IndexNow (production URLs)
        if: success()
        env:
          INDEXNOW_HOST: www.mtcrenovations.ca
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY_MTC }}
        run: node scripts/submit-indexnow.mjs

      # Post-deploy: verify live site still serves MTC
      - name: Verify live site
        run: |
          sleep 15
          LIVE=$(curl -sL --max-time 15 "https://www.mtcrenovations.ca" | grep -o '<title>[^<]*</title>' | head -1 | sed 's/<[^>]*>//g')
          echo "Live title: $LIVE"
          if ! echo "$LIVE" | grep -qi "MTC Renovations"; then
            echo "::warning::Post-deploy check failed. Live title: $LIVE"
          fi
